  </defs>
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>
  <!-- 5 petals -->
  <circle cx="16" cy="8" r="5" fill="url(#petal)" opacity="0.95"/>
  <circle cx="22.5" cy="14" r="5" fill="url(#petal)" opacity="0.95"/>
  <circle cx="19" cy="22" r="5" fill="url(#petal)" opacity="0.95"/>
  <circle cx="13" cy="22" r="5" fill="url(#petal)" opacity="0.95"/>
  <circle cx="9.5" cy="14" r="5" fill="url(#petal)" opacity="0.95"/>
  <!-- center -->
